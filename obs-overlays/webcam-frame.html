<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Frame</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 420px; height: 320px;
  overflow: hidden;
  font-family: 'Segoe UI', 'Montserrat', sans-serif;
  background: transparent;
}

/* Moldura externa */
.frame {
  position: relative;
  width: 100%; height: 100%;
  padding: 3px;
}

/* Borda animada */
.frame-border {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 1px solid rgba(255,255,255,0.4);
  pointer-events: none;
}

/* Cantos */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: #ffffff;
  border-style: solid;
}
.corner-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
.corner-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
.corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
.corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

/* Brilho no canto superior */
.glow-corner {
  position: absolute;
  top: -1px; left: -1px;
  width: 100px; height: 1px;
  background: linear-gradient(90deg, transparent 0%, #ffffff 50%, transparent 100%);
  animation: cornerGlow 3s ease-in-out infinite;
}
@keyframes cornerGlow {
  0%, 100% { opacity: 0.3; left: -1px; }
  50% { opacity: 1; left: calc(100% - 100px); }
}

/* Label do canal */
.channel-label {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  padding: 4px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: labelIn 1s ease 0.5s forwards;
}
@keyframes labelIn {
  to { opacity: 1; }
}
.live-dot {
  width: 6px; height: 6px;
  background: #ff3333;
  border-radius: 50%;
  animation: livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.channel-label span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ffffff;
}
</style>
</head>
<body>
<div class="frame">
  <div class="frame-border"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="glow-corner"></div>
  <div class="channel-label">
    <div class="live-dot"></div>
    <span>SEU CANAL</span>
  </div>
</div>
</body>
</html>
