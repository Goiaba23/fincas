<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameplay Bar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 60px;
  overflow: hidden;
  font-family: 'Segoe UI', 'Montserrat', sans-serif;
  background: transparent;
}

.bar {
  position: absolute;
  bottom: 0;
  width: 100%; height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

/* Linha superior sutil */
.bar::before {
  content: '';
  position: absolute;
  top: 0; left: 30px; right: 30px;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
}

/* Fundo */
.bar-bg {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  pointer-events: none;
}

/* Esquerda - Info */
.left-section {
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 2;
}
.game-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.game-icon {
  width: 28px; height: 28px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.game-name {
  font-size: 13px;
  font-weight: 500;
  color: #ffffff;
  letter-spacing: 1px;
}
.game-name span {
  font-weight: 300;
  color: rgba(255,255,255,0.4);
}

.separator {
  width: 1px;
  height: 20px;
  background: rgba(255,255,255,0.15);
}

.follow-count {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}
.follow-count strong {
  color: #ffffff;
  font-weight: 600;
}

/* Direita - Social */
.right-section {
  display: flex;
  align-items: center;
  gap: 25px;
  z-index: 2;
}
.social-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  transition: color 0.3s ease;
}
.social-item:hover {
  color: rgba(255,255,255,0.8);
}
.social-item .dot {
  width: 4px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}
.social-item .value {
  color: rgba(255,255,255,0.7);
}

/* Transições */
.slide-in {
  animation: slideIn 1s ease forwards;
  opacity: 0;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.delay-1 { animation-delay: 0.2s; }
.delay-2 { animation-delay: 0.4s; }
.delay-3 { animation-delay: 0.6s; }
</style>
</head>
<body>
<div class="bar-bg"></div>
<div class="bar">
  <div class="left-section">
    <div class="game-info slide-in delay-1">
      <div class="game-icon">🎮</div>
      <div class="game-name"><span>Jogando</span> NOME DO JOGO</div>
    </div>
    <div class="separator"></div>
    <div class="follow-count slide-in delay-2">
      <strong>123</strong> seguidores
    </div>
  </div>
  <div class="right-section">
    <div class="social-item slide-in delay-2">
      <span class="dot"></span> twitch.tv/<span class="value">seucanal</span>
    </div>
    <div class="social-item slide-in delay-3">
      <span class="dot"></span> discord.gg/<span class="value">seuserver</span>
    </div>
  </div>
</div>
</body>
</html>
