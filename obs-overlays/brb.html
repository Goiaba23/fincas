<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRB</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Segoe UI', 'Montserrat', sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #ffffff;
}

/* Grid dots pattern */
.dots {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Glow animado */
.glow-circle {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
  animation: glowPulse 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glowPulse {
  0%, 100% { transform: scale(0.8); opacity: 0.4; }
  50% { transform: scale(1.5); opacity: 0.8; }
}

/* Ícone animado */
.icon-container {
  position: relative;
  margin-bottom: 30px;
  animation: floatAnim 3s ease-in-out infinite;
}
@keyframes floatAnim {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
}
.icon-container svg {
  width: 80px; height: 80px;
  fill: none;
  stroke: #ffffff;
  stroke-width: 1.5;
}
.clock-hand {
  stroke-dasharray: 100;
  animation: rotateHand 4s linear infinite;
  transform-origin: 32px 32px;
}
@keyframes rotateHand {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.content {
  text-align: center;
  z-index: 10;
}
.main-title {
  font-size: 72px;
  font-weight: 200;
  letter-spacing: 8px;
  text-transform: uppercase;
  animation: fadeSlide 1.5s ease;
}
.main-title strong {
  font-weight: 700;
}
.subtitle {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  margin-top: 15px;
  text-transform: uppercase;
  animation: fadeSlide 1.8s ease;
}

/* Loading bar */
.loading-container {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  text-align: center;
  z-index: 10;
  animation: fadeIn 2s ease;
}
.loading-text {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 10px;
}
.loading-bar {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.loading-bar-fill {
  height: 100%;
  width: 30%;
  background: #ffffff;
  position: absolute;
  animation: loadingMove 2.5s ease-in-out infinite;
}
@keyframes loadingMove {
  0% { left: -30%; }
  100% { left: 100%; }
}

@keyframes fadeSlide {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>
<body>
<div class="dots"></div>
<div class="glow-circle" style="top:30%;left:50%;transform:translate(-50%,-50%);"></div>
<div class="glow-circle" style="bottom:20%;right:20%;animation-delay:2s;"></div>

<div class="content">
  <div class="icon-container">
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="26" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="32" y1="32" x2="32" y2="16" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="32" x2="44" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round" class="clock-hand"/>
    </svg>
  </div>
  <div class="main-title"><strong>VOLTO</strong> JÁ</div>
  <div class="subtitle">Só vou pegar uma água e volto</div>
</div>

<div class="loading-container">
  <div class="loading-text">Aguarde um momento</div>
  <div class="loading-bar">
    <div class="loading-bar-fill"></div>
  </div>
</div>
</body>
</html>
