services:
  - type: web
    name: fincas-api
    env: docker
    repo: https://github.com/USER/REPO
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fincas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://frontend-goiaba23s-projects.vercel.app
      - key: ENVIRONMENT
        value: production

databases:
  - name: fincas-db
    plan: free
    databaseName: fincas
    user: fincas
